<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সালাহ ড্যাশবোর্ড | ৩০ দিনের চ্যালেঞ্জ</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #091214;
            --card: rgba(255, 255, 255, 0.07);
            --gold: #ceac41;
            --emerald: #10b981;
            --red: #ef4444;
            --text: #f8fafc;
        }

        body {
            font-family: 'Hind Siliguri', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            width: 100%;
            max-width: 450px;
            background: var(--card);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .date-header {
            color: var(--gold);
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .day-count {
            font-size: 0.9rem;
            opacity: 0.6;
            margin-bottom: 25px;
        }

        .prayer-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        .prayer-card {
            background: rgba(255,255,255,0.03);
            padding: 15px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            cursor: pointer;
        }

        .prayer-card.done {
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--emerald);
        }

        .btn-check {
            background: var(--emerald);
            border: none;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .btn-check:disabled {
            background: #444;
            cursor: not-allowed;
        }

        /* Chart Area */
        .chart-container {
            margin: 30px 0;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
        }

        #nextDayBtn {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: none;
            background: var(--gold);
            color: #000;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }

        #nextDayBtn.unlocked {
            opacity: 1;
            box-shadow: 0 0 15px rgba(206, 172, 65, 0.4);
        }

        /* Toast Message */
        #toast {
            position: fixed;
            bottom: 30px;
            background: var(--emerald);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            display: none;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp { from { transform: translateY(100px); } to { transform: translateY(0); } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="date-header" id="currentDate">তারিখ লোড হচ্ছে...</div>
    <div class="day-count" id="dayDisplay">দিন: ১/৩০</div>

    <div class="prayer-list" id="prayerList">
        </div>

    <button id="nextDayBtn" onclick="moveToNextDay()" disabled>পরবর্তী দিন (লকড)</button>

    <div class="chart-container">
        <h3 style="font-size: 1rem; margin-bottom: 15px;">সামগ্রিক রিপোর্ট (৩০ দিন)</h3>
        <canvas id="myChart"></canvas>
    </div>
</div>

<div id="toast">আলহামদুলিল্লাহ! আল্লাহ কবুল করুন।</div>

<script>
    const prayers = ["ফজর", "যোহর", "আসর", "মাগরিব", "এশা"];
    let db = JSON.parse(localStorage.getItem('namaz_pro_db')) || {
        currentDay: 1,
        history: [], // stores total counts
        todayStatus: [false, false, false, false, false]
    };

    const bNum = (n) => n.toString().replace(/\d/g, d => "০১২৩৪৫৬৭৮৯"[d]);

    function init() {
        renderPrayers();
        updateStats();
        showDate();
    }

    function showDate() {
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bn-BD', options);
        document.getElementById('dayDisplay').innerText = `চ্যালেঞ্জের দিন: ${bNum(db.currentDay)} / ৩০`;
    }

    function renderPrayers() {
        const container = document.getElementById('prayerList');
        container.innerHTML = '';
        
        prayers.forEach((p, i) => {
            const isDone = db.todayStatus[i];
            container.innerHTML += `
                <div class="prayer-card ${isDone ? 'done' : ''}" onclick="toggleNamaz(${i})">
                    <span class="prayer-name">${p}</span>
                    <button class="btn-check" ${isDone ? 'disabled' : ''}>
                        ${isDone ? 'সম্পন্ন' : 'আদায় করুন'}
                    </button>
                </div>
            `;
        });

        checkDayUnlock();
    }

    function toggleNamaz(index) {
        if (db.todayStatus[index]) return;
        
        db.todayStatus[index] = true;
        save();
        renderPrayers();
        showToast();
        updateStats();
    }

    function showToast() {
        const t = document.getElementById('toast');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2500);
    }

    function checkDayUnlock() {
        const allDone = db.todayStatus.every(s => s === true);
        const btn = document.getElementById('nextDayBtn');
        if (allDone) {
            btn.disabled = false;
            btn.classList.add('unlocked');
            btn.innerText = "পরবর্তী দিনে যান";
        } else {
            btn.disabled = true;
            btn.classList.remove('unlocked');
            btn.innerText = "৫ ওয়াক্ত পূর্ণ করুন (লকড)";
        }
    }

    function moveToNextDay() {
        if (db.currentDay >= 30) {
            alert("অভিনন্দন! আপনি ৩০ দিনের চ্যালেঞ্জ পূর্ণ করেছেন।");
            return;
        }
        
        // Save today's result to history
        db.history.push([...db.todayStatus]);
        db.currentDay++;
        db.todayStatus = [false, false, false, false, false];
        
        save();
        init();
        alert("মাশাআল্লাহ! নতুন দিন শুরু হলো।");
    }

    function save() {
        localStorage.setItem('namaz_pro_db', JSON.stringify(db));
    }

    // Chart logic
    let myChart;
    function updateStats() {
        let totalPrayed = 0;
        db.history.forEach(day => day.forEach(s => { if(s) totalPrayed++ }));
        db.todayStatus.forEach(s => { if(s) totalPrayed++ });

        const totalPossible = 30 * 5;
        const prayedPercent = ((totalPrayed / totalPossible) * 100).toFixed(1);
        const kazaPercent = (100 - prayedPercent).toFixed(1);

        const ctx = document.getElementById('myChart').getContext('2d');
        
        if (myChart) myChart.destroy();
        
        myChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['আদায়', 'বাকি/কাজা'],
                datasets: [{
                    data: [totalPrayed, totalPossible - totalPrayed],
                    backgroundColor: ['#10b981', '#333'],
                    borderWidth: 0
                }]
            },
            options: {
                plugins: {
                    legend: { labels: { color: '#fff', font: { family: 'Hind Siliguri' } } }
                }
            }
        });
    }

    init();
</script>

</body>
</html>
